<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>711bc Audio Converter | Hi-Fi WAV</title>
    
    <script src="https://unpkg.com/wavesurfer.js"></script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #090e17 0%, #162032 100%);
            --glass-bg: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --accent-color: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .studio-container {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border-radius: 24px;
            width: 100%; max-width: 800px;
            padding: 40px; box-sizing: border-box;
        }

        .header { text-align: center; margin-bottom: 35px; }
        .header h1 { 
            margin: 0; font-size: 2.5rem; font-weight: 800; letter-spacing: -0.5px; 
            background: var(--accent-gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-text {
            color: var(--text-muted); font-size: 0.85rem;
            max-width: 500px; margin: 12px auto 0;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px; border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .discord-link {
            display: inline-flex; align-items: center; gap: 8px;
            margin-top: 15px; color: #5865F2; text-decoration: none;
            font-size: 0.95rem; font-weight: 600;
            padding: 6px 12px; border-radius: 20px;
            background: rgba(88, 101, 242, 0.1);
        }

        .upload-area {
            border: 2px dashed #334155; border-radius: 16px; padding: 45px 20px;
            text-align: center; cursor: pointer; transition: 0.3s;
            background: rgba(15, 23, 42, 0.4);
        }
        .upload-area:hover { border-color: var(--accent-color); background: rgba(15, 23, 42, 0.8); }
        
        #editorArea { display: none; }

        .waveform-wrapper {
            background: rgba(15, 23, 42, 0.5); border-radius: 14px;
            padding: 15px; margin-bottom: 25px; border: 1px solid var(--glass-border);
        }

        .controls-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px; margin-bottom: 35px;
        }

        .control-item label { 
            display: flex; justify-content: space-between; 
            font-weight: 600; font-size: 0.9em; margin-bottom: 12px; 
        }
        .control-item span { color: #a78bfa; }
        
        input[type="range"] { width: 100%; accent-color: var(--accent-color); cursor: pointer; }

        .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn {
            flex: 1; min-width: 150px; padding: 15px; border: none; border-radius: 12px;
            font-weight: bold; font-size: 0.95rem; cursor: pointer; transition: 0.3s;
        }
        .btn-reset { background: transparent; color: var(--text-muted); border: 1px dashed #475569; }
        .btn-play { background: #1e293b; color: var(--text-main); border: 1px solid #334155; }
        .btn-export { background: var(--accent-gradient); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #statusMsg { text-align: center; margin-top: 20px; font-weight: 600; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div class="studio-container">
        <div class="header">
            <h1>711bc Audio Converter</h1>
            <p class="info-text">
                <b>Hi-Fi WAV Edition</b>. Kualitas jernih maksimal untuk <b>Sevenelefen Beach Club</b>.
            </p>
            <a href="https://discord.gg/agYYe2rtMt" target="_blank" class="discord-link">
                <svg width="20" height="20" viewBox="0 0 127.14 96.36" fill="currentColor"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.39,80.21a105.73,105.73,0,0,0,32.17,16.15,77.7,77.7,0,0,0,6.89-11.11,68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.19-16.14c2.64-27.38-4.52-51.06-19.36-72.13ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg>
                discord.gg/agYYe2rtMt
            </a>
        </div>

        <div id="uploadArea" class="upload-area" onclick="document.getElementById('fileInput').click()">
            <h3 style="margin:0; color:#f8fafc;">Pilih File Audio</h3>
            <p style="margin:8px 0 0; color:#64748b;">Klik untuk konversi ke WAV (Lossless)</p>
            <input type="file" id="fileInput" accept="audio/*" style="display: none;">
        </div>

        <div id="editorArea">
            <h4 id="trackName" style="margin-top:0; color:#94a3b8; text-align:center;"></h4>
            <div class="waveform-wrapper"><div id="waveform"></div></div>

            <div class="controls-grid">
                <div class="control-item">
                    <label>Bypass Speed (Chipmunk) <span id="valSpeed">2.30x</span></label>
                    <input type="range" id="ctrlSpeed" min="0.5" max="3.0" step="0.01" value="2.3">
                </div>
                <div class="control-item">
                    <label>Volume Boost <span id="valVol">0 dB</span></label>
                    <input type="range" id="ctrlVol" min="-20" max="15" step="1" value="0">
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-reset" onclick="location.reload()">🔄 Reset / Baru</button>
                <button id="btnPlay" class="btn btn-play">▶ Play Preview</button>
                <button id="btnExport" class="btn btn-export">⬇ Convert ke WAV</button>
            </div>
            <div id="statusMsg"></div>
        </div>
    </div>

    <script>
        let currentFile = null;
        let wavesurfer = null;

        const fileInput = document.getElementById('fileInput');
        const statusMsg = document.getElementById('statusMsg');
        const ctrlSpeed = document.getElementById('ctrlSpeed');
        const ctrlVol = document.getElementById('ctrlVol');
        const btnPlay = document.getElementById('btnPlay');
        const btnExport = document.getElementById('btnExport');

        wavesurfer = WaveSurfer.create({
            container: '#waveform', waveColor: '#475569', progressColor: '#8b5cf6',
            cursorColor: '#f8fafc', barWidth: 2, height: 80, responsive: true
        });

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            currentFile = file;
            document.getElementById('trackName').innerText = "🎵 " + file.name;
            document.getElementById('uploadArea').style.display = 'none';
            document.getElementById('editorArea').style.display = 'block';
            wavesurfer.loadBlob(file);
            wavesurfer.on('ready', () => {
                wavesurfer.setPlaybackRate(2.3);
                wavesurfer.getMediaElement().preservesPitch = false;
            });
        });

        btnPlay.addEventListener('click', () => {
            wavesurfer.isPlaying() ? wavesurfer.pause() : wavesurfer.play();
            btnPlay.innerHTML = wavesurfer.isPlaying() ? '⏸ Pause' : '▶ Play Preview';
        });

        ctrlSpeed.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('valSpeed').innerText = val.toFixed(2) + 'x';
            wavesurfer.setPlaybackRate(val);
        });

        ctrlVol.addEventListener('input', (e) => {
            const dbVal = parseInt(e.target.value);
            document.getElementById('valVol').innerText = dbVal + ' dB';
            wavesurfer.setVolume(Math.pow(10, dbVal / 20));
        });

        function shortenName(name) {
            let base = name.replace(/\.[^/.]+$/, "").toLowerCase();
            let short = base.replace(/[aeiou\s]/g, "");
            return short || "audio";
        }

        btnExport.addEventListener('click', async () => {
            if (!currentFile) return;
            btnExport.disabled = true;
            statusMsg.style.color = '#60a5fa';
            statusMsg.innerText = "⏳ Sedang me-render WAV kualitas studio...";

            try {
                const speed = parseFloat(ctrlSpeed.value);
                const volumeDb = parseInt(ctrlVol.value);
                const arrayBuffer = await currentFile.arrayBuffer();
                const audioCtx = new AudioContext();
                const decodedData = await audioCtx.decodeAudioData(arrayBuffer);
                
                const newDuration = decodedData.duration / speed;
                const offlineCtx = new OfflineAudioContext(decodedData.numberOfChannels, Math.ceil(decodedData.sampleRate * newDuration), decodedData.sampleRate);
                
                const source = offlineCtx.createBufferSource();
                source.buffer = decodedData;
                source.playbackRate.value = speed;
                const gainNode = offlineCtx.createGain();
                gainNode.gain.value = Math.pow(10, volumeDb / 20);
                source.connect(gainNode); gainNode.connect(offlineCtx.destination);
                source.start(0);
                
                const renderedBuffer = await offlineCtx.startRendering();
                audioCtx.close();

                // Convert AudioBuffer ke Blob WAV (Native JS)
                const wavBlob = audioBufferToWav(renderedBuffer);
                
                const finalName = "711bc_" + shortenName(currentFile.name) + ".wav";
                const url = URL.createObjectURL(wavBlob);
                const a = document.createElement('a'); a.href = url; a.download = finalName; a.click();
                
                statusMsg.style.color = '#34d399'; statusMsg.innerText = "✅ Selesai! Siap upload ke Roblox.";
            } catch (err) {
                console.error(err);
                statusMsg.style.color = '#f87171'; statusMsg.innerText = "❌ Kesalahan sistem render.";
            } finally { btnExport.disabled = false; }
        });

        // --- NATIVE WAV ENCODER (STABIL & TANPA LIBRARY) ---
        function audioBufferToWav(buffer) {
            let numOfChan = buffer.numberOfChannels,
                length = buffer.length * numOfChan * 2 + 44,
                bufferWav = new ArrayBuffer(length),
                view = new DataView(bufferWav),
                channels = [], i, sample,
                offset = 0,
                pos = 0;

            function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
            function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

            setUint32(0x46464952); // "RIFF"
            setUint32(length - 8); // file length - 8
            setUint32(0x45564157); // "WAVE"
            setUint32(0x20746d66); // "fmt " chunk
            setUint32(16);         // length = 16
            setUint16(1);          // PCM (uncompressed)
            setUint16(numOfChan);
            setUint32(buffer.sampleRate);
            setUint32(buffer.sampleRate * 2 * numOfChan); // avg. bytes/sec
            setUint16(numOfChan * 2); // block-align
            setUint16(16);         // 16-bit
            setUint32(0x61746164); // "data" chunk
            setUint32(length - pos - 4); // chunk length

            for(i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));

            while(pos < length) {
                for(i = 0; i < numOfChan; i++) {
                    sample = Math.max(-1, Math.min(1, channels[i][offset]));
                    sample = (sample < 0 ? sample * 0x8000 : sample * 0x7FFF) | 0;
                    view.setInt16(pos, sample, true);
                    pos += 2;
                }
                offset++;
            }
            return new Blob([bufferWav], { type: 'audio/wav' });
        }
    </script>
</body>
</html>
