<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Audio Studio | Batch Modifier</title>
    
    <!-- Library Eksternal -->
    <script src="https://unpkg.com/wavesurfer.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    
    <style>
        :root {
            --bg: #f1f5f9;
            --glass-bg: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.8);
            --accent: #3b82f6;
            --text: #1e293b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header, .audio-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            border-radius: 16px;
        }

        header {
            width: 100%;
            max-width: 900px;
            padding: 25px;
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        h1 { margin: 0; font-size: 1.8rem; font-weight: 700; color: #0f172a; }
        .subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 20px; }

        .master-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            background: rgba(255,255,255,0.4);
            padding: 15px;
            border-radius: 12px;
        }

        .control-item label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9em; }
        input[type="range"] { width: 100%; accent-color: var(--accent); }

        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex-grow: 1;
            text-align: center;
        }
        .btn-upload { background: #0f172a; color: #fff; }
        .btn-upload:hover { background: #1e293b; }
        .btn-download { background: var(--accent); color: #fff; }
        .btn-download:hover { background: #2563eb; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #audioList { width: 100%; max-width: 900px; display: grid; gap: 15px; }
        
        .audio-card {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .file-info { width: 200px; flex-shrink: 0; }
        .file-name { font-weight: 600; font-size: 0.95em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .waveform-container { flex-grow: 1; height: 50px; min-width: 200px; }
        .btn-remove { background: var(--danger); color: white; padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85em; }

        #statusText { margin-top: 15px; font-size: 0.9em; font-weight: 600; color: var(--accent); }
        .footer { margin-top: auto; padding-top: 30px; font-size: 0.8em; color: #94a3b8; }

        @media (max-width: 600px) {
            .audio-card { flex-direction: column; align-items: stretch; }
            .file-info { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Aether Audio Studio</h1>
        <div class="subtitle">Batch Processor (Max 10 Files) - Speed, Pitch, & dB Gain</div>

        <div class="master-controls">
            <div class="control-item">
                <label>Speed: <span id="mSpeedLabel">1.0</span>x</label>
                <input type="range" id="masterSpeed" min="0.5" max="2.3" step="0.01" value="1.0">
            </div>
            <div class="control-item">
                <label>Pitch (Nada): <span id="mPitchLabel">0</span></label>
                <input type="range" id="masterPitch" min="-12" max="12" step="1" value="0">
            </div>
            <div class="control-item">
                <label>Gain: <span id="mVolLabel">0 dB</span></label>
                <input type="range" id="masterVol" min="-40" max="15" step="1" value="0">
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">📁 Tambah Lagu</button>
            <button id="downloadAll" class="btn btn-download" disabled>⬇️ Render & Unduh (.ZIP)</button>
            <input type="file" id="fileInput" multiple accept="audio/*" style="display: none;">
        </div>
        <div id="statusText"></div>
    </header>

    <div id="audioList"></div>
    <div class="footer">&copy; 2026 AetherZebub</div>

    <script>
        let waveSurfers = [];
        const MAX_FILES = 10;
        const fileInput = document.getElementById('fileInput');
        const audioList = document.getElementById('audioList');
        const downloadBtn = document.getElementById('downloadAll');
        const statusText = document.getElementById('statusText');

        const mSpeed = document.getElementById('masterSpeed');
        const mPitch = document.getElementById('masterPitch');
        const mVol = document.getElementById('masterVol');

        fileInput.addEventListener('change', (e) => {
            let files = Array.from(e.target.files);
            if (files.length > MAX_FILES) {
                alert(`Maksimal ${MAX_FILES} file sekaligus untuk menjaga performa browser Anda.`);
                files = files.slice(0, MAX_FILES);
            }
            if (files.length > 0) downloadBtn.disabled = false;
            files.forEach(file => createAudioCard(file));
            fileInput.value = ''; 
        });

        function createAudioCard(file) {
            const id = 'wave-' + Math.random().toString(36).substr(2, 9);
            const card = document.createElement('div');
            card.className = 'audio-card';
            card.innerHTML = `
                <div class="file-info">
                    <div class="file-name" title="${file.name}">${file.name}</div>
                    <div style="font-size: 0.75em; color: #64748b;">Ready</div>
                </div>
                <div class="waveform-container" id="${id}"></div>
                <button class="btn-remove" onclick="removeCard(this, '${id}')">Hapus</button>
            `;
            audioList.appendChild(card);

            const ws = WaveSurfer.create({
                container: '#' + id,
                waveColor: '#94a3b8',
                progressColor: '#3b82f6',
                cursorColor: 'transparent',
                barWidth: 2,
                height: 50,
                responsive: true
            });

            ws.loadBlob(file);
            ws.on('ready', () => {
                ws.setPlaybackRate(parseFloat(mSpeed.value));
                const dbVal = parseFloat(mVol.value);
                const linearVol = Math.pow(10, dbVal / 20);
                ws.setVolume(linearVol);
            });
            waveSurfers.push({ id: id, instance: ws, fileName: file.name, fileBlob: file });
        }

        function removeCard(btn, id) {
            btn.parentElement.remove();
            waveSurfers = waveSurfers.filter(item => item.id !== id);
            if (waveSurfers.length === 0) downloadBtn.disabled = true;
        }

        mSpeed.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('mSpeedLabel').innerText = val;
            waveSurfers.forEach(item => item.instance.setPlaybackRate(val));
        });

        mPitch.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('mPitchLabel').innerText = val > 0 ? "+" + val : val;
        });

        mVol.addEventListener('input', (e) => {
            const dbVal = parseFloat(e.target.value);
            document.getElementById('mVolLabel').innerText = dbVal > 0 ? "+" + dbVal + " dB" : dbVal + " dB";
            const linearVol = Math.pow(10, dbVal / 20);
            waveSurfers.forEach(item => item.instance.setVolume(linearVol));
        });

        // --- SISTEM RENDER AUDIO (VERSI AMAN DARI MEMORY LEAK) ---
        async function processAudioToWav(fileBlob, speed, volumeDb, pitch) {
            // Menggunakan URL statis untuk dimuat oleh Tone.js (Mencegah AudioContext Crash)
            const url = URL.createObjectURL(fileBlob);
            const toneBuffer = new Tone.ToneAudioBuffer();
            
            await toneBuffer.load(url);
            URL.revokeObjectURL(url); // Bersihkan RAM

            const duration = toneBuffer.duration / speed;

            const renderedBuffer = await Tone.Offline(() => {
                const offlinePlayer = new Tone.Player(toneBuffer);
                offlinePlayer.playbackRate = speed;
                
                const pitchShift = new Tone.PitchShift(pitch);
                const volNode = new Tone.Volume(volumeDb);

                offlinePlayer.chain(pitchShift, volNode, Tone.Destination);
                offlinePlayer.start(0);
            }, duration);

            return audioBufferToWav(renderedBuffer.get());
        }

        function audioBufferToWav(buffer) {
            const numOfChan = buffer.numberOfChannels;
            const length = buffer.length * numOfChan * 2 + 44;
            const bufferArray = new ArrayBuffer(length);
            const view = new DataView(bufferArray);
            const channels = [], sampleRate = buffer.sampleRate;
            let offset = 0, pos = 0;

            function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
            function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

            setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157); 
            setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
            setUint32(sampleRate); setUint32(sampleRate * 2 * numOfChan); 
            setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164); 
            setUint32(length - pos - 4);

            for(let i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));

            while(pos < length) {
                for(let i = 0; i < numOfChan; i++) {
                    let sample = Math.max(-1, Math.min(1, channels[i][offset]));
                    sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0;
                    view.setInt16(pos, sample, true);
                    pos += 2;
                }
                offset++;
            }
            return new Blob([bufferArray], {type: "audio/wav"});
        }

        downloadBtn.addEventListener('click', async () => {
            statusText.innerText = "⏳ Memulai mesin audio... (Mohon tunggu)";
            downloadBtn.disabled = true;
            
            try {
                // Wajib untuk menyalakan engine audio di browser modern
                await Tone.start(); 
                
                const zip = new JSZip();
                const currentSpeed = parseFloat(mSpeed.value);
                const currentPitch = parseFloat(mPitch.value);
                const currentVolDb = parseFloat(mVol.value);

                for (let i = 0; i < waveSurfers.length; i++) {
                    const item = waveSurfers[i];
                    statusText.innerText = `⏳ Merender lagu ${i + 1} dari ${waveSurfers.length}... (Proses ini butuh waktu)`;
                    
                    await new Promise(r => setTimeout(r, 100)); // Beri napas ke UI
                    
                    const wavBlob = await processAudioToWav(item.fileBlob, currentSpeed, currentVolDb, currentPitch);
                    
                    let newName = "Mod_" + item.fileName.replace(/\.[^/.]+$/, "") + ".wav";
                    zip.file(newName, wavBlob);
                }

                statusText.innerText = "📦 Sedang membungkus menjadi ZIP...";
                const zipContent = await zip.generateAsync({type: "blob"});
                
                const url = URL.createObjectURL(zipContent);
                const a = document.createElement('a');
                a.href = url;
                a.download = "Aether_Mod_Audio.zip";
                a.click();

                statusText.innerText = "✅ Selesai! File ZIP berhasil diunduh.";
            } catch (error) {
                console.error("Detail Error:", error);
                statusText.innerText = "❌ Terjadi kesalahan. Coba gunakan file audio dengan ukuran lebih kecil/pendek terlebih dahulu.";
            } finally {
                downloadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
